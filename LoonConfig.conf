# 🟢>>>>>>>>>>>功能策略<<<<<<<<<<<<<<<🟢
# 🟢>>>>>>>>>>>节点筛选<<<<<<<<<<<<<<<🟢

[Remote Filter]
# ==================== 🌏 亚洲 ====================
# ✈️ 香港
Asia_HK = NameRegex, FilterKey = "(?i)(🇭🇰|香港|HK|Hong Kong|港|hk)"
# 🌴 台湾
Asia_TW = NameRegex, FilterKey = "(?i)(🇹🇼|台湾|TW|Taiwan|台|tw)"
# 🗾 日本
Asia_JP = NameRegex, FilterKey = "(?i)(🇯🇵|日本|JP|Japan|东京|大阪|jp)"
# 🌕 韩国
Asia_KR = NameRegex, FilterKey = "(?i)(🇰🇷|韩国|KR|Korea|首尔|韩|kr)"
# 🦁 新加坡
Asia_SG = NameRegex, FilterKey = "(?i)(🇸🇬|新加坡|SG|Singapore|狮城|sg)"
# 🌏 其他亚洲（澳门、泰国、越南、马来西亚、菲律宾、印度、印尼）
Asia_Others = NameRegex, FilterKey = "(?i)(🇲🇴|澳门|MO|🇹🇭|泰国|TH|Thailand|🇻🇳|越南|🇲🇾|马来西亚|MY|🇵🇭|菲律宾|PH|🇮🇳|印度|🇮🇩|印尼)"

# ==================== 🌍 欧洲 ====================
# 🇬🇧 英国
Europe_UK = NameRegex, FilterKey = "(?i)(🇬🇧|英国|UK|London|英|gb)"
# 🇩🇪 德国
Europe_DE = NameRegex, FilterKey = "(?i)(🇩🇪|德国|DE|Germany|法兰克福|柏林|de)"
# 🇫🇷 法国
Europe_FR = NameRegex, FilterKey = "(?i)(🇫🇷|法国|FR|France|巴黎|fr)"
# 🇳🇱 荷兰
Europe_NL = NameRegex, FilterKey = "(?i)(🇳🇱|荷兰|NL|Netherlands|阿姆斯特丹|nl)"
# 🇪🇺 其他欧洲（俄罗斯、意大利、西班牙、瑞典、瑞士��奥地利、波兰、土耳其、芬兰、挪威、丹麦）
Europe_Others = NameRegex, FilterKey = "(?i)(🇷🇺|俄罗斯|RU|Russia|🇮🇹|意大利|IT|🇪🇸|西班牙|ES|🇸🇪|瑞典|SE|🇨🇭|瑞士|CH|🇦🇹|奥地利|AT|🇵🇱|波兰|PL|🇹🇷|土耳其|TR|🇫🇮|芬兰|🇳🇴|挪威|🇩🇰|丹麦|DK)"

# ==================== 🌎 北美洲 ====================
# 🇺🇸 美国
NA_US = NameRegex, FilterKey = "(?i)(🇺🇸|美国|US|United States|洛杉矶|硅谷|纽约|芝加哥|西雅图|美|us)"
# 🇨🇦 加拿大
NA_CA = NameRegex, FilterKey = "(?i)(🇨🇦|加拿大|CA|Canada|蒙特利尔|多伦多|ca)"

# ==================== 🌎 南美洲 ====================
# 🇧🇷 巴西
SA_BR = NameRegex, FilterKey = "(?i)(🇧🇷|巴西|BR|Brazil|br)"
# 🌎 其他南美（阿根廷、智利、墨西哥）
SA_Others = NameRegex, FilterKey = "(?i)(🇦🇷|阿根廷|AR|Argentina|🇨🇱|智利|CL|Chile|🇲🇽|墨西哥|MX|Mexico)"

# ==================== 🌍 非洲 ====================
# 🌍 非洲（南非、尼日利亚、肯尼亚、埃及）
Africa = NameRegex, FilterKey = "(?i)(🇿🇦|南非|ZA|South Africa|🇳🇬|尼日利亚|NG|🇰🇪|肯尼亚|KE|🇪🇬|埃及|EG|Egypt)"

# ==================== 🌏 大洋洲 ====================
# 🇦🇺 澳大利亚
Oceania_AU = NameRegex, FilterKey = "(?i)(🇦🇺|澳大利亚|AU|Australia|悉尼|au)"
# 🇳🇿 新西兰
Oceania_NZ = NameRegex, FilterKey = "(?i)(🇳🇿|新西兰|NZ|New Zealand|nz)"

# ==================== 其他/未分类 ====================
Other_All = NameRegex, FilterKey = "^(?!.*(?:🇭🇰|香港|HK|🇹🇼|台湾|TW|🇯🇵|日本|JP|🇰🇷|韩国|KR|🇸🇬|新加坡|SG|🇬🇧|英国|UK|🇩🇪|德国|DE|🇫🇷|法国|FR|🇳🇱|荷兰|NL|🇺🇸|美国|US|🇨🇦|加拿大|CA|🇦🇺|澳大利亚|AU|🇳🇿|新西兰|NZ))"


[Proxy Group]
# ==================== 顶级手动选择 ====================
全局手动 = select,亚洲节点,欧洲节点,北美节点,南美节点,非洲节点,大洋洲节点,其他节点,DIRECT,img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Global.png

# ==================== 大洲策略组（url-test 自动测速） ====================
亚洲节点 = url-test,Asia_HK,Asia_TW,Asia_JP,Asia_KR,Asia_SG,Asia_Others,url=http://cp.cloudflare.com/generate_204,interval=600,tolerance=120,img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Asia.png

欧洲节点 = url-test,Europe_UK,Europe_DE,Europe_FR,Europe_NL,Europe_Others,url=http://cp.cloudflare.com/generate_204,interval=600,tolerance=120,img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Europe.png

北美节点 = url-test,NA_US,NA_CA,url=http://cp.cloudflare.com/generate_204,interval=600,tolerance=120,img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/North_America.png

南美节点 = url-test,SA_BR,SA_Others,url=http://cp.cloudflare.com/generate_204,interval=600,tolerance=120,img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/South_America.png

非洲节点 = url-test,Africa,url=http://cp.cloudflare.com/generate_204,interval=600,tolerance=120,img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Africa.png

大洋洲节点 = url-test,Oceania_AU,Oceania_NZ,url=http://cp.cloudflare.com/generate_204,interval=600,tolerance=120,img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Oceania.png

# 未分类/其他
其他节点 = url-test,Other_All,url=http://cp.cloudflare.com/generate_204,interval=600,tolerance=120,img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/World.png

# ==================== 子地区策略组（精细控制用）====================
香港节点 = url-test,Asia_HK,url=http://cp.cloudflare.com/generate_204,interval=600,tolerance=80,img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png
台湾节点 = url-test,Asia_TW,url=http://cp.cloudflare.com/generate_204,interval=600,tolerance=80,img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png
日本节点 = url-test,Asia_JP,url=http://cp.cloudflare.com/generate_204,interval=600,tolerance=80,img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png
韩国节点 = url-test,Asia_KR,url=http://cp.cloudflare.com/generate_204,interval=600,tolerance=80,img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Korea.png
新加坡节点 = url-test,Asia_SG,url=http://cp.cloudflare.com/generate_204,interval=600,tolerance=80,img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png
美国节点 = url-test,NA_US,url=http://cp.cloudflare.com/generate_204,interval=600,tolerance=80,img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png
英国节点 = url-test,Europe_UK,url=http://cp.cloudflare.com/generate_204,interval=600,tolerance=80,img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_Kingdom.png
