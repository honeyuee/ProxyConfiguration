йҰҷжёҜHong Kong = NameRegex, FilterKey = "^(?=.*((?i)рҹҮӯрҹҮ°|йҰҷжёҜ|Hong Kong|HK|д№қйҫҷ|ж–°з•Ң))(?!(?i).*?(еӣһеӣҪ|ж Ўеӣӯ|жёёжҲҸ|рҹҺ®|GAME|еҶ…зҪ‘|жөӢиҜ•|еӨ§йҷҶ|еҸ°ж№ҫ)).*$"
