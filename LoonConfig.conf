# 🟢>>>>>>>>>>>节点筛选<<<<<<<<<<<<<<<🟢
[Remote Filter]
# 基础抽象节点过滤基础规则
# 过滤掉含有游戏、回国、校园等相关关键词的节点
基础过滤 = NameRegex, FilterKey = "^(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b)|(\b(Games)\b))).*$"

# 亚洲节点Asia 
香港Hong Kong = NameRegex, FilterKey = "^(?=.*((?i)🇭🇰|香港|(\b(HK|Hong)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
台湾Taiwan = NameRegex, FilterKey = "^(?=.*((?i)🇹🇼|台湾|(\b(TW|Taiwan)\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
日本Japan = NameRegex, FilterKey = "^(?=.*((?i)🇯🇵|日本|(\b(JP|Japan)\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
韩国South Korea = NameRegex, FilterKey = "^(?=.*((?i)🇰🇷|韩国|(\b(KR|South)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
中国China = NameRegex, FilterKey = "^(?=.*((?i)🇨🇳|中国|(\b(CN|China)\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
新加坡Singapore = NameRegex, FilterKey = "^(?=.*((?i)🇸🇬|新加坡|(\b(SG|Singapore)\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"

# 欧洲节点Europe
英国United Kingdom = NameRegex, FilterKey = "^(?=.*((?i)🇬🇧|英国|(\b(UK|United)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
德国Germany = NameRegex, FilterKey = "^(?=.*((?i)🇩🇪|德国|(\b(DE|Germany)\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
法国France = NameRegex, FilterKey = "^(?=.*((?i)🇫🇷|法国|(\b(FR|France)\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
意大利Italy = NameRegex, FilterKey = "^(?=.*((?i)🇮🇹|意大利|(\b(IT|Italy)\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
西班牙Spain = NameRegex, FilterKey = "^(?=.*((?i)🇪🇸|西班牙|(\b(ES|Spain)\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"

# 美洲节点America
美国United States = NameRegex, FilterKey = "^(?=.*((?i)🇺🇸|美国|(\b(US|United)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
加拿大Canada = NameRegex, FilterKey = "^(?=.*((?i)🇨🇦|加拿大|(\b(CA|Canada)\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
巴西Brazil = NameRegex, FilterKey = "^(?=.*((?i)🇧🇷|巴西|(\b(BR|Brazil)\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"

# 非洲节点Africa
南非South Africa = NameRegex, FilterKey = "^(?=.*((?i)🇿🇦|南非|🇪🇬|埃及|(\b(ZA|South|EG|Egypt)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"

# 大洋洲节点Oceania
澳大利亚Australia = NameRegex, FilterKey = "^(?=.*((?i)🇦🇺|澳大利亚|新西兰|(\b(AU|Australia)\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"



